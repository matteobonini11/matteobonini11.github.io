# Site settings
title: Matteo Bonini
subtitle: Associate Professor
name: Matteo Bonini
description: >-
  Associate Professor at Aalborg University. 
  Research in coding theory, algebra, geometry, and cryptography.
url: "[yourusername.github.io](https://yourusername.github.io)"  # Replace with your actual URL
baseurl: ""  # Leave empty if using username.github.io

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Author info (appears in sidebar)
author:
  name: "Matteo Bonini"
  avatar: "/assets/images/profile.jpg"
  bio: "Associate Professor in Mathematics"
  location: "Aalborg, Denmark"
  email: "mabo@math.aau.dk"
  links:
    - label: "Aalborg University"
      icon: "fas fa-fw fa-university"
      url: "[math.aau.dk](https://www.math.aau.dk/)"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "#"  # Add your Google Scholar link
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "#"  # Add your ORCID

# Reading files
include:
  - _pages

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "main"

# Navigation
header:
  overlay_color: "#1a1a1a"
